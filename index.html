<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>今日菜单认领 & 团购</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.0.0/dist/tabler-icons.min.css" />
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #ffffff; --bg2: #f5f5f3; --bg3: #eeede8;
  --text: #1a1a18; --text2: #6b6b68; --text3: #a0a09c;
  --border: rgba(0,0,0,0.12); --border2: rgba(0,0,0,0.22);
  --radius: 10px; --radius-sm: 7px;
}
@media (prefers-color-scheme: dark) {
  :root {
    --bg: #1e1e1c; --bg2: #2a2a28; --bg3: #333331;
    --text: #f0efea; --text2: #a0a09c; --text3: #666662;
    --border: rgba(255,255,255,0.1); --border2: rgba(255,255,255,0.2);
  }
}
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg3); color: var(--text); min-height: 100vh; }
.wrap { max-width: 680px; margin: 0 auto; padding: 1.5rem 1rem 3rem; }
h1 { font-size: 22px; font-weight: 500; }
.tabs { display: flex; border-bottom: 0.5px solid var(--border2); margin-bottom: 1.5rem; }
.tab { padding: 10px 20px; font-size: 14px; cursor: pointer; border: none; background: none; color: var(--text2); border-bottom: 2px solid transparent; margin-bottom: -0.5px; transition: all 0.15s; }
.tab.active { color: var(--text); border-bottom-color: #378ADD; font-weight: 500; }
.page { display: none; }
.page.active { display: block; }
.name-bar { display: flex; gap: 8px; align-items: center; margin-bottom: 1.5rem; background: var(--bg2); border-radius: var(--radius-sm); padding: 10px 14px; }
.name-bar input { flex: 1; font-size: 14px; border: none; background: transparent; outline: none; color: var(--text); }
.name-bar label { font-size: 13px; color: var(--text2); white-space: nowrap; }
.avatar { width: 28px; height: 28px; border-radius: 50%; background: #E6F1FB; color: #0C447C; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 500; flex-shrink: 0; }
.card { background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--radius); padding: 1rem 1.25rem; margin-bottom: 10px; }
.card.dashed { background: var(--bg2); border-style: dashed; }
.section-title { font-size: 12px; font-weight: 500; color: var(--text2); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 10px; }
.menu-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
.menu-name { font-size: 16px; font-weight: 500; }
.price-tag { font-size: 13px; font-weight: 500; padding: 3px 10px; border-radius: 20px; background: #EAF3DE; color: #3B6D11; }
.slots { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 10px; }
.slot { border-radius: var(--radius-sm); padding: 7px 14px; font-size: 13px; cursor: pointer; transition: all 0.15s; display: flex; align-items: center; gap: 6px; min-width: 90px; border: 0.5px solid; }
.slot.empty { border-color: var(--border2); background: var(--bg2); color: var(--text3); }
.slot.empty:hover { border-color: #85B7EB; background: #E6F1FB; color: #185FA5; }
.slot.mine { background: #E6F1FB; border-color: #378ADD; color: #0C447C; font-weight: 500; }
.slot.taken { background: #EAF3DE; border-color: #97C459; color: #3B6D11; cursor: default; font-weight: 500; }
.av-sm { width: 20px; height: 20px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 500; flex-shrink: 0; }
.slot.mine .av-sm { background: #378ADD; color: #E6F1FB; }
.slot.taken .av-sm { background: #639922; color: #EAF3DE; }
.slot.empty .av-sm { background: var(--border2); }
.menu-footer { display: flex; align-items: center; justify-content: space-between; font-size: 12px; color: var(--text2); }
.badge { font-size: 11px; padding: 2px 8px; border-radius: 20px; }
.badge.blue { background: #E6F1FB; color: #185FA5; }
.badge.green { background: #EAF3DE; color: #3B6D11; }
.badge.amber { background: #FAEEDA; color: #854F0B; }
.form-row { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 8px; }
input[type=text], input[type=number] {
  padding: 8px 12px; border: 0.5px solid var(--border2); border-radius: var(--radius-sm);
  background: var(--bg); color: var(--text); font-size: 14px; outline: none; transition: border-color 0.15s;
}
input[type=text]:focus, input[type=number]:focus { border-color: #378ADD; }
input[type=text] { flex: 1; min-width: 100px; }
input[type=number] { width: 80px; }
button { padding: 8px 16px; border: 0.5px solid var(--border2); border-radius: var(--radius-sm); background: var(--bg); color: var(--text); font-size: 14px; cursor: pointer; transition: all 0.15s; }
button:hover { background: var(--bg2); }
button:active { transform: scale(0.98); }
.summary-row { display: flex; justify-content: space-between; padding: 7px 0; border-bottom: 0.5px solid var(--border); font-size: 14px; }
.summary-row:last-child { border: none; font-weight: 500; }
.del-btn { font-size: 11px; color: var(--text2); border: none; background: none; cursor: pointer; padding: 2px 6px; border-radius: 4px; }
.del-btn:hover { color: #A32D2D; background: #FCEBEB; }
.leave-btn { border: 0.5px solid var(--border2) !important; white-space: nowrap; }
.leave-btn:hover { border-color: #EF9F27 !important; color: #854F0B; background: #FAEEDA; }
.gb-card { background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--radius); padding: 1rem 1.25rem; margin-bottom: 12px; }
.gb-title { font-size: 15px; font-weight: 500; margin-bottom: 4px; }
.gb-meta { font-size: 12px; color: var(--text2); margin-bottom: 12px; }
.gb-members { display: flex; flex-direction: column; gap: 6px; }
.gb-member { display: flex; align-items: center; gap: 10px; padding: 8px 10px; border-radius: var(--radius-sm); background: var(--bg2); }
.gb-member .av { width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 500; background: #E6F1FB; color: #0C447C; flex-shrink: 0; }
.gb-member .info { flex: 1; }
.gb-member .name { font-size: 13px; font-weight: 500; }
.gb-member .item { font-size: 12px; color: var(--text2); }
.gb-member .mprice { font-size: 13px; font-weight: 500; margin-right: 8px; }
.pay-btn { font-size: 11px; padding: 4px 10px; border-radius: 20px; cursor: pointer; border: 0.5px solid; transition: all 0.15s; }
.pay-btn.unpaid { background: #FAEEDA; color: #854F0B; border-color: #EF9F27; }
.pay-btn.paid { background: #EAF3DE; color: #3B6D11; border-color: #97C459; }
.gb-footer { margin-top: 12px; padding-top: 10px; border-top: 0.5px solid var(--border); display: flex; justify-content: space-between; align-items: center; font-size: 13px; color: var(--text2); }
.empty-state { text-align: center; padding: 2.5rem 1rem; color: var(--text2); font-size: 14px; }
.empty-state i { font-size: 32px; display: block; margin-bottom: 8px; opacity: 0.4; }
.topbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; }
.refresh-btn { font-size: 13px; display: flex; align-items: center; gap: 5px; }
.refresh-btn.spinning i { animation: spin 0.6s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: #2C2C2A; color: #F1EFE8; padding: 10px 20px; border-radius: var(--radius-sm); font-size: 13px; opacity: 0; transition: opacity 0.3s; pointer-events: none; z-index: 999; white-space: nowrap; }
.toast.show { opacity: 1; }
.loading { text-align: center; padding: 2rem; color: var(--text2); font-size: 14px; }
</style>
</head>
<body>
<div class="wrap">
  <div class="topbar">
    <h1><i class="ti ti-bowl-chopsticks" style="font-size:20px;margin-right:6px;"></i>今日菜单</h1>
    <button class="refresh-btn" id="refreshBtn" onclick="manualRefresh()"><i class="ti ti-refresh"></i>刷新</button>
  </div>
  <p style="font-size:14px;color:var(--text2);margin-bottom:1rem;" id="dateLabel"></p>

  <div class="name-bar">
    <div class="avatar" id="avatarBox">我</div>
    <label>你的名字：</label>
    <input type="text" id="myName" placeholder="输入名字后才能认领或加入团购" maxlength="10" />
  </div>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('menu')"><i class="ti ti-salad" style="margin-right:5px;"></i>菜单认领</button>
    <button class="tab" onclick="switchTab('group')"><i class="ti ti-shopping-cart" style="margin-right:5px;"></i>团购</button>
  </div>

  <div class="page active" id="page-menu">
    <div id="menuList"><div class="loading"><i class="ti ti-loader" style="font-size:20px;"></i><br>载入中…</div></div>
    <div class="card dashed" style="margin-bottom:10px;">
      <div style="font-size:13px;color:var(--text2);margin-bottom:10px;"><i class="ti ti-plus"></i> 新增菜品</div>
      <div class="form-row">
        <input type="text" id="newDish" placeholder="菜名" maxlength="20" />
        <input type="number" id="newPrice" placeholder="价格" min="0" max="999" step="0.5" />
        <input type="number" id="newSlots" placeholder="份数" min="1" max="20" value="5" style="width:70px;" />
        <button onclick="addDish()"><i class="ti ti-plus"></i> 添加</button>
      </div>
    </div>
    <div class="section-title" style="margin-bottom:10px;">我的认领汇总</div>
    <div class="card" id="summaryBox">
      <p style="font-size:13px;color:var(--text2);">还没有认领任何菜品</p>
    </div>
  </div>

  <div class="page" id="page-group">
    <div class="section-title">发起新团购</div>
    <div class="card dashed" style="margin-bottom:1.5rem;">
      <div class="form-row">
        <input type="text" id="gbName" placeholder="团购名称（如：下午茶、水果）" maxlength="30" />
      </div>
      <div class="form-row">
        <input type="text" id="gbItem" placeholder="我要的品项（如：珍奶大杯）" maxlength="30" />
        <input type="number" id="gbPrice" placeholder="金额" min="0" max="9999" step="1" />
        <button onclick="createGroup()"><i class="ti ti-users"></i> 发起</button>
      </div>
    </div>
    <div class="section-title">进行中的团购</div>
    <div id="groupList"><div class="loading"><i class="ti ti-loader" style="font-size:20px;"></i><br>载入中…</div></div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, doc, onSnapshot, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAqigdGrSnBs2TS8yMEsohoW549kf_AWzs",
  authDomain: "tung-d409d.firebaseapp.com",
  projectId: "tung-d409d",
  storageBucket: "tung-d409d.firebasestorage.app",
  messagingSenderId: "277076173047",
  appId: "1:277076173047:web:e0f068a37ea03d30e233f2"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let myName = '';
let menuData = { dishes: [] };
let groupData = { groups: [] };

document.getElementById('dateLabel').textContent = new Date().toLocaleDateString('zh-TW', { year:'numeric', month:'long', day:'numeric', weekday:'long' });

// 监听 Firestore 实时更新
onSnapshot(doc(db, 'app', 'menu'), snap => {
  if (snap.exists()) {
    menuData = snap.data();
  } else {
    menuData = { dishes: [
      { id: 1, name: '红烧肉饭', price: 18, slots: Array(5).fill(null) },
      { id: 2, name: '番茄炒蛋盖饭', price: 15, slots: Array(5).fill(null) },
      { id: 3, name: '麻婆豆腐饭', price: 14, slots: Array(5).fill(null) },
    ]};
    setDoc(doc(db, 'app', 'menu'), menuData);
  }
  renderMenu();
});

onSnapshot(doc(db, 'app', 'groups'), snap => {
  if (snap.exists()) {
    groupData = snap.data();
  } else {
    groupData = { groups: [] };
  }
  renderGroups();
});

async function saveMenu() {
  await setDoc(doc(db, 'app', 'menu'), menuData);
}
async function saveGroup() {
  await setDoc(doc(db, 'app', 'groups'), groupData);
}

window.manualRefresh = function() {
  showToast('数据实时同步中，无需手动刷新 ✓');
}

window.switchTab = function(tab) {
  document.querySelectorAll('.tab').forEach((t,i) => t.classList.toggle('active', (i===0&&tab==='menu')||(i===1&&tab==='group')));
  document.getElementById('page-menu').classList.toggle('active', tab==='menu');
  document.getElementById('page-group').classList.toggle('active', tab==='group');
}

function renderMenu() {
  const list = document.getElementById('menuList');
  list.innerHTML = '';
  if (!menuData.dishes || !menuData.dishes.length) {
    list.innerHTML = '<div class="empty-state"><i class="ti ti-salad"></i>还没有菜品</div>';
    renderSummary(); return;
  }
  menuData.dishes.forEach(dish => {
    const taken = dish.slots.filter(s => s !== null).length;
    const card = document.createElement('div');
    card.className = 'card';
    const slotsHtml = dish.slots.map((s, i) => {
      if (s === null) return `<div class="slot empty" onclick="claim(${dish.id},${i})"><span class="av-sm"><i class="ti ti-plus" style="font-size:10px;"></i></span><span>空位</span></div>`;
      if (s === myName && myName) return `<div class="slot mine" onclick="unclaim(${dish.id},${i})"><span class="av-sm">${s.slice(0,2)}</span><span>${s}</span></div>`;
      return `<div class="slot taken"><span class="av-sm">${s.slice(0,2)}</span><span>${s}</span></div>`;
    }).join('');
    card.innerHTML = `
      <div class="menu-header">
        <span class="menu-name">${dish.name}</span>
        <div style="display:flex;align-items:center;gap:8px;">
          <span class="price-tag">¥${dish.price}</span>
          <button class="del-btn" onclick="removeDish(${dish.id})"><i class="ti ti-trash"></i></button>
        </div>
      </div>
      <div class="slots">${slotsHtml}</div>
      <div class="menu-footer">
        <span>已认领 ${taken}/${dish.slots.length} 份</span>
        ${taken === dish.slots.length ? '<span class="badge blue">已满</span>' : ''}
      </div>`;
    list.appendChild(card);
  });
  renderSummary();
}

function renderSummary() {
  const mySlots = [];
  (menuData.dishes || []).forEach(d => d.slots.forEach(s => { if (s === myName && myName) mySlots.push({ name: d.name, price: d.price }); }));
  const box = document.getElementById('summaryBox');
  if (!mySlots.length) { box.innerHTML = '<p style="font-size:13px;color:var(--text2);">还没有认领任何菜品</p>'; return; }
  const total = mySlots.reduce((a,b) => a + b.price, 0);
  box.innerHTML = mySlots.map(s => `<div class="summary-row"><span>${s.name}</span><span>¥${s.price}</span></div>`).join('') +
    `<div class="summary-row"><span>合计</span><span style="color:#185FA5;">¥${total}</span></div>`;
}

function renderGroups() {
  const list = document.getElementById('groupList');
  list.innerHTML = '';
  if (!groupData.groups || !groupData.groups.length) {
    list.innerHTML = `<div class="empty-state"><i class="ti ti-shopping-cart"></i>还没有团购，发起一个吧！</div>`;
    return;
  }
  groupData.groups.forEach(g => {
    const card = document.createElement('div');
    card.className = 'gb-card';
    const total = g.members.reduce((a,m) => a + m.price, 0);
    const paidCount = g.members.filter(m => m.paid).length;
    const paidTotal = g.members.filter(m => m.paid).reduce((a,m) => a + m.price, 0);
    const isMember = g.members.some(m => m.name === myName);
    const membersHtml = g.members.map((m, mi) => {
      const isMe = m.name === myName;
      const isOrg = myName === g.organizer;
      return `<div class="gb-member">
        <div class="av">${m.name.slice(0,2)}</div>
        <div class="info">
          <div class="name">${m.name}${m.name === g.organizer ? ' <span style="font-size:10px;color:var(--text2);">（发起人）</span>' : ''}</div>
          <div class="item">${m.item}</div>
        </div>
        <span class="mprice">¥${m.price}</span>
        ${isMe || isOrg
          ? `<button class="pay-btn ${m.paid ? 'paid' : 'unpaid'}" onclick="togglePaid('${g.id}',${mi})">${m.paid ? '✓ 已付款' : '未付款'}</button>`
          : `<span class="badge ${m.paid ? 'green' : 'amber'}">${m.paid ? '已付款' : '未付款'}</span>`
        }
        ${isMe ? `<button class="del-btn leave-btn" onclick="leaveGroup('${g.id}')"><i class="ti ti-x"></i> 不买了</button>` : ''}
      </div>`;
    }).join('');
    const joinSection = !isMember ? `
      <div style="display:flex;gap:8px;margin-top:10px;flex-wrap:wrap;">
        <input type="text" id="joinItem-${g.id}" placeholder="我要的品项" maxlength="30" style="flex:1;min-width:100px;font-size:13px;" />
        <input type="number" id="joinPrice-${g.id}" placeholder="金额" min="0" style="width:80px;font-size:13px;" />
        <button onclick="joinGroup('${g.id}')" style="font-size:13px;padding:8px 12px;"><i class="ti ti-plus"></i> 加入</button>
      </div>` : '';
    card.innerHTML = `
      <div style="display:flex;justify-content:space-between;align-items:flex-start;">
        <div>
          <div class="gb-title"><i class="ti ti-shopping-bag" style="font-size:14px;margin-right:5px;"></i>${g.name}</div>
          <div class="gb-meta">发起人：${g.organizer} · ${g.members.length} 人参与</div>
        </div>
        ${myName === g.organizer ? `<button class="del-btn" onclick="removeGroup('${g.id}')"><i class="ti ti-trash"></i> 结束</button>` : ''}
      </div>
      <div class="gb-members">${membersHtml}</div>
      ${joinSection}
      <div class="gb-footer">
        <span>总金额 <strong>¥${total}</strong></span>
        <span>已收款 <strong style="color:#3B6D11;">¥${paidTotal}</strong> · ${paidCount}/${g.members.length} 人</span>
      </div>`;
    list.appendChild(card);
  });
}

window.claim = async function(dishId, idx) {
  if (!myName) { showToast('请先输入你的名字！'); return; }
  const d = menuData.dishes.find(d => d.id === dishId);
  if (!d || d.slots[idx] !== null) return;
  d.slots[idx] = myName;
  await saveMenu();
  showToast(`已认领 ${d.name} 🎉`);
}
window.unclaim = async function(dishId, idx) {
  const d = menuData.dishes.find(d => d.id === dishId);
  if (!d || d.slots[idx] !== myName) return;
  d.slots[idx] = null;
  await saveMenu();
  showToast(`已取消认领 ${d.name}`);
}
window.removeDish = async function(id) {
  menuData.dishes = menuData.dishes.filter(d => d.id !== id);
  await saveMenu();
}
window.addDish = async function() {
  const name = document.getElementById('newDish').value.trim();
  const price = parseFloat(document.getElementById('newPrice').value);
  const slots = parseInt(document.getElementById('newSlots').value) || 5;
  if (!name || isNaN(price)) { showToast('请填写完整的菜名和价格'); return; }
  menuData.dishes.push({ id: Date.now(), name, price, slots: Array(Math.min(slots,20)).fill(null) });
  document.getElementById('newDish').value = '';
  document.getElementById('newPrice').value = '';
  document.getElementById('newSlots').value = '5';
  await saveMenu();
  showToast(`已添加 ${name}`);
}
window.createGroup = async function() {
  if (!myName) { showToast('请先输入你的名字！'); return; }
  const name = document.getElementById('gbName').value.trim();
  const item = document.getElementById('gbItem').value.trim();
  const price = parseFloat(document.getElementById('gbPrice').value);
  if (!name || !item || isNaN(price)) { showToast('请填写团购名称、品项和金额'); return; }
  if (!groupData.groups) groupData.groups = [];
  groupData.groups.push({ id: 'g' + Date.now(), name, organizer: myName, members: [{ name: myName, item, price, paid: false }] });
  document.getElementById('gbName').value = '';
  document.getElementById('gbItem').value = '';
  document.getElementById('gbPrice').value = '';
  await saveGroup();
  showToast(`团购「${name}」已发起！`);
}
window.joinGroup = async function(gid) {
  if (!myName) { showToast('请先输入你的名字！'); return; }
  const g = groupData.groups.find(g => g.id === gid);
  if (!g) return;
  if (g.members.some(m => m.name === myName)) { showToast('你已加入这个团购'); return; }
  const item = document.getElementById(`joinItem-${gid}`).value.trim();
  const price = parseFloat(document.getElementById(`joinPrice-${gid}`).value);
  if (!item || isNaN(price)) { showToast('请填写品项和金额'); return; }
  g.members.push({ name: myName, item, price, paid: false });
  await saveGroup();
  showToast(`已加入团购「${g.name}」！`);
}
window.togglePaid = async function(gid, mi) {
  const g = groupData.groups.find(g => g.id === gid);
  if (!g) return;
  const m = g.members[mi];
  if (myName !== m.name && myName !== g.organizer) return;
  m.paid = !m.paid;
  await saveGroup();
  showToast(m.paid ? `已标记 ${m.name} 付款完成` : '已取消付款标记');
}
window.removeGroup = async function(gid) {
  groupData.groups = groupData.groups.filter(g => g.id !== gid);
  await saveGroup();
  showToast('团购已结束');
}
window.leaveGroup = async function(gid) {
  if (!myName) { showToast('请先输入你的名字'); return; }
  const g = groupData.groups.find(g => g.id === gid);
  if (!g) return;
  const idx = g.members.findIndex(m => m.name === myName);
  if (idx === -1) { showToast('你还没加入这个团购'); return; }
  const m = g.members[idx];
  if (!confirm(`确定不买「${m.item}」了吗？会把你从这个团购里移除。`)) return;
  g.members.splice(idx, 1);
  if (g.members.length === 0) {
    // 没人了就把整个团购也清掉
    groupData.groups = groupData.groups.filter(x => x.id !== gid);
  } else if (g.organizer === myName) {
    // 发起人退出，顺位交给下一位
    g.organizer = g.members[0].name;
  }
  await saveGroup();
  showToast('已退出团购');
}

let toastTimer;
window.showToast = function(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2200);
}
function showToast(msg) { window.showToast(msg); }

document.getElementById('myName').addEventListener('input', e => {
  myName = e.target.value.trim();
  document.getElementById('avatarBox').textContent = myName ? myName.slice(0,2) : '我';
  renderMenu();
  renderGroups();
});
</script>
</body>
